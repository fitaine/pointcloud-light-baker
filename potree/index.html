<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Point Cloud — Potree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

  <!-- ── Potree 1.8.2 — exact deps from examples/copc.html ── -->
  <link rel="stylesheet" href="Potree_1.8.2/build/potree/potree.css">
  <link rel="stylesheet" href="Potree_1.8.2/libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" href="Potree_1.8.2/libs/openlayers3/ol.css">
  <link rel="stylesheet" href="Potree_1.8.2/libs/spectrum/spectrum.css">
  <link rel="stylesheet" href="Potree_1.8.2/libs/jstree/themes/mixed/style.css">
  <script src="Potree_1.8.2/libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="Potree_1.8.2/libs/spectrum/spectrum.js"></script>
  <script src="Potree_1.8.2/libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="Potree_1.8.2/libs/other/BinaryHeap.js"></script>
  <script src="Potree_1.8.2/libs/tween/tween.min.js"></script>
  <script src="Potree_1.8.2/libs/d3/d3.js"></script>
  <script src="Potree_1.8.2/libs/proj4/proj4.js"></script>
  <script src="Potree_1.8.2/libs/openlayers3/ol.js"></script>
  <script src="Potree_1.8.2/libs/i18next/i18next.js"></script>
  <script src="Potree_1.8.2/libs/jstree/jstree.js"></script>
  <!-- three.js r124 as global — same version Potree bundles, needed for volume shader code -->
  <script src="Potree_1.8.2/libs/three.js/build/three.min.js"></script>
  <script src="Potree_1.8.2/libs/copc/index.js"></script>
  <script src="Potree_1.8.2/build/potree/potree.js"></script>
  <!-- NOTE: three.js r124 must be loaded before potree.js so window.THREE is defined -->
  <!-- laslaz.js must come AFTER potree.js — needed for LAZ decompression in COPC -->
  <script src="Potree_1.8.2/libs/plasio/js/laslaz.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07080a; }

    /* ── Hide Potree sidebar + fix canvas ──────────────────────────────── */
    #potree_sidebar_container         { display: none !important; }
    .potree_container                 { background: transparent !important; }
    #potree_render_area               { position: fixed; inset: 0; z-index: 1; }
    #potree_render_area canvas        { cursor: crosshair !important; display: block; }

    /* ── Loading ────────────────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(200,240,224,.45);
      background: #07080a;
      transition: opacity .6s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }

    /* ── Badge ──────────────────────────────────────────────────────────── */
    #badge {
      position: fixed; top: 20px; left: 24px; z-index: 50;
      font-family: 'IBM Plex Mono', monospace; font-size: 9px;
      letter-spacing: .16em; text-transform: uppercase;
      color: rgba(200,240,224,.25); pointer-events: none;
    }

    /* ── Controls — bottom left ─────────────────────────────────────────── */
    #ui {
      position: fixed; bottom: 24px; left: 24px; z-index: 50;
      display: none; flex-direction: column; gap: 10px;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      letter-spacing: .12em; color: rgba(200,240,224,.65);
    }
    #ui.visible { display: flex; }

    .row { display: flex; align-items: center; gap: 12px; }
    .lbl { width: 72px; text-transform: uppercase; opacity: .5; font-size: 9px; }
    .val { width: 24px; opacity: .6; font-size: 9px; }

    input[type=range] {
      width: 100px; accent-color: #c8f0e0; cursor: crosshair;
      -webkit-appearance: none; height: 2px; background: rgba(200,240,224,.15);
      border-radius: 1px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      background: #c8f0e0; border-radius: 50%; cursor: crosshair;
    }

    button {
      background: none;
      border: 1px solid rgba(200,240,224,.18);
      color: rgba(200,240,224,.65);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      padding: 5px 14px; cursor: crosshair; align-self: flex-start;
      transition: border-color .15s, color .15s, background .15s;
    }
    button:hover {
      border-color: rgba(200,240,224,.55);
      color: rgba(200,240,224,.9);
    }
    button.active {
      border-color: rgba(200,240,224,.45);
      color: rgba(200,240,224,.95);
      background: rgba(200,240,224,.06);
    }

    /* ── Scene nav — top right ──────────────────────────────────────────── */
    #scene-nav {
      position: fixed; top: 20px; right: 24px; z-index: 60;
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
      font-family: 'IBM Plex Mono', monospace;
    }
    #scene-nav a {
      font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(200,240,224,.45); text-decoration: none;
      border: 1px solid rgba(200,240,224,.14);
      padding: 4px 12px; cursor: crosshair;
      transition: border-color .15s, color .15s, background .15s;
    }
    #scene-nav a:hover {
      border-color: rgba(200,240,224,.5); color: rgba(200,240,224,.9);
    }
    #scene-nav a.current {
      border-color: rgba(200,240,224,.45); color: rgba(200,240,224,.95);
      background: rgba(200,240,224,.06);
    }

    /* ── Telemetry — bottom right ───────────────────────────────────────── */
    #telemetry {
      position: fixed; bottom: 24px; right: 24px; z-index: 50;
      display: none;
      font-family: 'IBM Plex Mono', monospace; font-size: 9px;
      letter-spacing: .10em; color: rgba(200,240,224,.28);
      text-align: right; pointer-events: none; line-height: 1.9;
    }
    #telemetry.visible { display: block; }
  </style>
</head>
<body>

  <div id="loading">Loading…</div>
  <div id="badge">Potree · Point Cloud</div>
  <nav id="scene-nav"></nav>

  <!-- Potree needs these two divs -->
  <div id="potree_render_area"></div>
  <div id="potree_sidebar_container"></div>

  <!-- Custom UI overlay -->
  <div id="ui">
    <div class="row">
      <span class="lbl">Size</span>
      <input type="range" id="size-slider" min="0.5" max="5" step="0.5" value="0.5">
      <span class="val" id="size-val">0.5</span>
    </div>
    <div class="row">
      <span class="lbl">Budget</span>
      <input type="range" id="budget-slider" min="1" max="10" step="1" value="5">
      <span class="val" id="budget-val">5M</span>
    </div>
    <button id="color-btn">⬡ Elevation mode</button>
    <button id="edl-btn" class="active">⬡ EDL depth</button>
    <button id="reset-btn">⊹ Reset view</button>
  </div>

  <div id="telemetry">
    <div id="fps-line">— fps</div>
    <div id="pts-line"></div>
    <div id="scene-line"></div>
  </div>

<script>
// ── Scene config ────────────────────────────────────────────────────────────
// Change SCENE_ID to switch between loaded scenes.
// The folder must exist under ./pointclouds/<SCENE_ID>/metadata.json
// Files: ./pointclouds/<key>.copc.laz  (generated by convert_to_copc.bat)
const SCENES = {
  "2023-09-19-mont-aiguille-2-detail": {"label": "Mont Aiguille \u00b7 Anneau de nuage", "volume": "anneau-de-nuage", "view": {"position": [914880.15, 6422226.87, 1820.77], "target": [901509.26, 6418970.76, 1931.62], "fov": 10.29}},
  "2023-11-10-grande-motte-detail": "2023-11-10_Grande Motte · Detail",
  "2026-03-09-chamechaude-detail": "Chamechaude · Detail",
  "dibona-detail": "Dibona · Albedo x Light",
  "2026-03-28-aiguille-dibona": "2026-03-28_Aiguille Dibona",
  "2026-03-09-chamechaude": "2026-03-09_Chamechaude",
  "spot_geom": "Spot test · Geometry",
  "spot_sat":  "Spot test · Satellite",
  "spot_lit":  "Spot test · Lit",
  "chamechaude-full": "Chamechaude HD",
  "chamechaude-lit":  "Chamechaude",
  "grande-motte-lit": "Grande Motte",
  "dibona-web-lit":   "Aiguille Dibona",
  // Volume-only test scene — ring visible without waiting for the full cloud
  "mont-aiguille-volume": {
    label: "Mont Aiguille · Anneau de nuage",
    volume: "anneau-de-nuage",
    nocloud: true,
    // Top-down view: camera directly above ring centre, looking straight down (-Z).
    // Potree uses Z-up so a purely -Z direction sets pitch = -π/2 cleanly.
    // ring bbox: [900342, 6417832, 1674] .. [902304, 6419810, 2597]
    view: {
      position: [901323, 6418821, 6000],
      target:   [901323, 6418821, 2136],
      fov: 55,
    },
  },
};

// Entries are either "Label" or { label, view } — view = the scene's 2D
// render framing { position:[x,y,z], target:[x,y,z], fov } in cloud coords
// (written by run_pipeline.py from the .blend scene camera + auto-align).
function sceneLabel(id) {
  const v = SCENES[id];
  return typeof v === "string" ? v : v.label;
}
function sceneView(id) {
  const v = SCENES[id];
  return (v && typeof v === "object" && v.view) ? v.view : null;
}
function sceneNoCloud(id) {
  const v = SCENES[id];
  return !!(v && typeof v === "object" && v.nocloud);
}

// Pick scene from URL ?scene=chamechaude, or default to first
const urlScene = new URLSearchParams(location.search).get("scene");
const SCENE_ID = (urlScene && SCENES[urlScene]) ? urlScene : Object.keys(SCENES)[0];
const SCENE_LABEL = sceneLabel(SCENE_ID);

document.title = SCENE_LABEL + " — Point Cloud";
document.getElementById("badge").textContent = "Potree · " + SCENE_LABEL;
document.getElementById("scene-line").textContent = SCENE_LABEL.toUpperCase();

// ── Scene nav — one link per scene, current highlighted ─────────────────────
const navEl = document.getElementById("scene-nav");
for (const id of Object.keys(SCENES)) {
  const a = document.createElement("a");
  a.href = "?scene=" + id;
  a.textContent = sceneLabel(id);
  if (id === SCENE_ID) a.classList.add("current");
  navEl.appendChild(a);
}

// ── Potree viewer ────────────────────────────────────────────────────────────
window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

viewer.setEDLEnabled(true);
viewer.setFOV(55);
viewer.setPointBudget(5_000_000);
viewer.setBackground("none");  // transparent — body CSS #07080a shows through

// ── Color space ──────────────────────────────────────────────────────────────
// Our baked colors are already sRGB-encoded uint8.
// Potree's shader passes them through without transformation.
// We want NO extra gamma at the renderer output — the browser/OS will
// interpret the framebuffer values as sRGB natively, which is correct.
const r = viewer.renderer;
r.setClearColor(0x07080a, 1);
if (typeof THREE !== "undefined") {
  if (r.outputColorSpace !== undefined) {
    // Three.js r152+ API
    r.outputColorSpace = THREE.LinearSRGBColorSpace;
  } else if (r.outputEncoding !== undefined) {
    // Three.js r134–r151 API (what Potree 1.8.2 bundles)
    r.outputEncoding = THREE.LinearEncoding;
  }
  r.toneMapping = THREE.NoToneMapping;
}

// ── Load point cloud ─────────────────────────────────────────────────────────
let pointcloud = null;
let useVertexColor = true;
let edlEnabled = true;

// ── Fix: CopcLoader.load is async but Potree never .catch()es it.
//    Any error from Copc.create() (bad VLR, network, range request) silently
//    rejects an unhandled promise — callback never fires, no console error.
//    Patch it here to surface failures.
if (Potree.CopcLoader) {
  const _origCopcLoad = Potree.CopcLoader.load;
  Potree.CopcLoader.load = async function(file, callback) {
    try {
      await _origCopcLoad.call(this, file, callback);
    } catch (err) {
      console.error("[CopcLoader] Failed to load:", file, "\n", err);
      document.getElementById("loading").innerHTML =
        "COPC load error<br><small style='opacity:.5;font-size:9px'>" +
        (err && err.message ? err.message : String(err)) + "</small>";
      callback(null);  // let the caller handle null geometry
    }
  };
}

// Also catch any other unhandled async rejections (fallback)
window.addEventListener("unhandledrejection", (ev) => {
  console.error("[unhandledrejection]", ev.reason);
  const msg = ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason);
  const el = document.getElementById("loading");
  if (el && el.style.display !== "none") {
    el.innerHTML = "Error: " + msg +
      "<br><small style='opacity:.4;font-size:9px'>open DevTools console for details</small>";
  }
});

// URL param ?test=1 → load Potree's bundled lion sample instead (for debugging)
const urlTest = new URLSearchParams(location.search).get("test");
// Cache-buster: bump when a .copc.laz is rebuilt under the same name —
// Chrome caches range-request chunks even across hard refreshes.
const CLOUD_VERSION = "11";
const CLOUD_URL = urlTest
  ? "./Potree_1.8.2/pointclouds/lion_takanawa.copc.laz"
  : `./pointclouds/${SCENE_ID}.copc.laz?v=${CLOUD_VERSION}`;
const CLOUD_LABEL = urlTest ? "lion (test)" : SCENE_LABEL;
console.log("[Potree] Loading:", CLOUD_URL);

if (sceneNoCloud(SCENE_ID)) {
  // Volume-only scene — no point cloud, fade loading immediately then set view
  const loadEl = document.getElementById("loading");
  loadEl.classList.add("fade");
  setTimeout(() => { loadEl.style.display = "none"; }, 700);
  document.getElementById("ui").classList.add("visible");
  document.getElementById("telemetry").classList.add("visible");
  document.getElementById("pts-line").textContent = "volume only";
  // Defer view setup so Potree's renderer has a chance to init
  setTimeout(() => {
    try {
      applyDefaultView();
      setTimeout(captureHomeView, 1500);
    } catch(err) {
      console.warn("[nocloud] applyDefaultView failed:", err);
    }
    // Custom orbit for volume-only scenes — both EarthControls and OrbitControls
    // do a raycast pick on every click and reset the pivot when they find nothing,
    // sending the camera into the volume. Instead, we capture all pointer/wheel
    // events before Potree sees them and modify view.yaw/pitch/radius directly.
    const canvas = viewer.renderer.domElement;
    const view   = viewer.scene.view;
    let _drag = { active: false, button: 0, lastX: 0, lastY: 0 };
    const ORBIT_SPEED = 0.004;
    const PAN_SPEED   = 0.0003;   // fraction of radius per pixel
    const ZOOM_SPEED  = 0.0012;

    function _eat(e) { e.stopPropagation(); e.preventDefault(); }

    canvas.addEventListener('contextmenu', _eat, true);

    canvas.addEventListener('mousedown', e => {
      _eat(e);
      _drag.active = true;
      _drag.button = e.button;
      _drag.lastX  = e.clientX;
      _drag.lastY  = e.clientY;
    }, true);

    window.addEventListener('mousemove', e => {
      if (!_drag.active) return;
      const dx = e.clientX - _drag.lastX;
      const dy = e.clientY - _drag.lastY;
      _drag.lastX = e.clientX;
      _drag.lastY = e.clientY;
      if (_drag.button === 0) {
        // Left drag → orbit
        view.yaw   -= dx * ORBIT_SPEED;
        view.pitch  = Math.max(-Math.PI / 2 + 0.05,
                        Math.min(-0.05, view.pitch - dy * ORBIT_SPEED));
      } else if (_drag.button === 2) {
        // Right drag → pan (translate the pivot in the view plane)
        const yaw = view.yaw;
        const pan = view.radius * PAN_SPEED;
        view.position.x += (-Math.cos(yaw) * dx + Math.sin(yaw) * dy) * pan;
        view.position.y += (-Math.sin(yaw) * dx - Math.cos(yaw) * dy) * pan;
      }
    }, true);

    window.addEventListener('mouseup', () => { _drag.active = false; }, true);

    canvas.addEventListener('wheel', e => {
      _eat(e);
      const factor = Math.exp(e.deltaY * ZOOM_SPEED);
      view.radius  = Math.max(100, Math.min(30000, view.radius * factor));
    }, { passive: false, capture: true });
  }, 100);
} else {
  Potree.loadPointCloud(
    CLOUD_URL,
    CLOUD_LABEL,
    (e) => {
      pointcloud = e.pointcloud;
      const mat = pointcloud.material;

      // --- Appearance ---
      mat.size          = 0.5;
      mat.pointSizeType = Potree.PointSizeType.FIXED;
      mat.shape         = Potree.PointShape.SQUARE;

      // Use baked vertex colors
      setVertexColorMode();

      viewer.scene.addPointCloud(pointcloud);
      applyDefaultView();
      setTimeout(captureHomeView, 1500);

      // Point count
      const npts = pointcloud.numPoints || 0;
      if (npts > 0) {
        document.getElementById("pts-line").textContent =
          (npts / 1e6).toFixed(1) + "M pts";
      }

      // Hide loading overlay
      const loadEl = document.getElementById("loading");
      loadEl.classList.add("fade");
      setTimeout(() => { loadEl.style.display = "none"; }, 700);

      document.getElementById("ui").classList.add("visible");
      document.getElementById("telemetry").classList.add("visible");
    }
  );
}

// ── Default view — the scene's 2D render framing when available ─────────────
let _homeView = null;   // captured after the initial framing

function applyDefaultView() {
  const v = sceneView(SCENE_ID);
  if (v) {
    viewer.scene.view.position.set(v.position[0], v.position[1], v.position[2]);
    viewer.scene.view.lookAt(new THREE.Vector3(v.target[0], v.target[1], v.target[2]));
    if (v.fov) viewer.setFOV(v.fov);
  } else if (_homeView) {
    // restore the exact framing captured after load — fitToScreen alone is
    // unreliable once the user has orbited (stale pivot)
    viewer.scene.view.position.copy(_homeView.position);
    viewer.scene.view.lookAt(_homeView.target.clone());
  } else {
    viewer.fitToScreen(0.6);
  }
}

function captureHomeView() {
  _homeView = {
    position: viewer.scene.view.position.clone(),
    target:   viewer.scene.view.getPivot().clone(),
  };
}

// ── Color modes ──────────────────────────────────────────────────────────────
function setVertexColorMode() {
  if (!pointcloud) return;
  const mat = pointcloud.material;
  // "rgba" uses the RGB colors baked into the point cloud
  mat.activeAttributeName = "rgba";
}

function setElevationMode() {
  if (!pointcloud) return;
  const mat = pointcloud.material;
  mat.activeAttributeName = "elevation";

  // Use Viridis palette matching the Three.js prototype viewer
  // Potree gradient: array of [t, THREE.Color] pairs, t in [0..1]
  if (Potree.Gradients && Potree.Gradients.VIRIDIS) {
    mat.gradient = Potree.Gradients.VIRIDIS;
  } else {
    // Manual Viridis approximation (matches prototype/main.js shader)
    mat.gradient = [
      [0.000, new THREE.Color(0x440154)],
      [0.125, new THREE.Color(0x482878)],
      [0.250, new THREE.Color(0x3e4989)],
      [0.375, new THREE.Color(0x31688e)],
      [0.500, new THREE.Color(0x26828e)],
      [0.625, new THREE.Color(0x1f9e89)],
      [0.750, new THREE.Color(0x35b779)],
      [0.875, new THREE.Color(0x6ece58)],
      [1.000, new THREE.Color(0xfde725)],
    ];
  }
}

// ── UI controls ──────────────────────────────────────────────────────────────

// Point size
document.getElementById("size-slider").addEventListener("input", e => {
  const v = parseFloat(e.target.value);
  document.getElementById("size-val").textContent = v;
  if (pointcloud) pointcloud.material.size = v;
});

// Point budget
document.getElementById("budget-slider").addEventListener("input", e => {
  const m = parseInt(e.target.value);
  document.getElementById("budget-val").textContent = m + "M";
  viewer.setPointBudget(m * 1_000_000);
});

// Color / elevation toggle
document.getElementById("color-btn").addEventListener("click", () => {
  useVertexColor = !useVertexColor;
  const btn = document.getElementById("color-btn");
  if (useVertexColor) {
    setVertexColorMode();
    btn.textContent = "⬡ Elevation mode";
    btn.classList.remove("active");
  } else {
    setElevationMode();
    btn.textContent = "⬡ Satellite + light";
    btn.classList.add("active");
  }
});

// EDL toggle
document.getElementById("edl-btn").addEventListener("click", () => {
  edlEnabled = !edlEnabled;
  viewer.setEDLEnabled(edlEnabled);
  document.getElementById("edl-btn").classList.toggle("active", edlEnabled);
});

// Reset view
document.getElementById("reset-btn").addEventListener("click", () => {
  applyDefaultView();
});

// ── Volumetric overlay — ray-marched 3D texture over the point cloud ────────
// Loads potree/volumes/<id>.bin (RGBA8: rgb=lit radiance, a=extinction) +
// <id>.json (lambert bbox). Marches per pixel, occluded by the point cloud
// via the EDL pass depth texture (EDL must be ON — it is by default).
// Volume id comes from the scene entry { volume: "anneau" } or ?vol= param.
function sceneVolume(id) {
  const v = SCENES[id];
  const urlVol = new URLSearchParams(location.search).get("vol");
  return urlVol || ((v && typeof v === "object" && v.volume) ? v.volume : null);
}

// WebGL 1 / GLSL ES 1.0 compatible shaders.
// 3D volume is packed as a 2D atlas (NZ slices tiled into a single texture).
const VOL_VERT = `
attribute vec3 position;
void main() { gl_Position = vec4(position.xy, 0.999, 1.0); }
`;

const VOL_FRAG = `
precision highp float;
uniform sampler2D uVol;
uniform sampler2D uDepth;
uniform vec3 uBoxMin, uBoxMax, uCamPos;
uniform mat4 uInvVP;
uniform vec2 uResolution;
uniform float uRgbMax, uSigmaMax, uGain;
uniform float uNZ, uNCOLS, uNROWS;

vec2 sliceUV(vec3 tc, float sliceIdx) {
  float col = mod(sliceIdx, uNCOLS);
  float row = floor(sliceIdx / uNCOLS);
  return (vec2(col, row) + tc.xy) / vec2(uNCOLS, uNROWS);
}
vec4 sampleVol(vec3 tc) {
  float z  = tc.z * uNZ;
  float z0 = floor(z);
  float z1 = min(z0 + 1.0, uNZ - 1.0);
  return mix(texture2D(uVol, sliceUV(tc, z0)),
             texture2D(uVol, sliceUV(tc, z1)), z - z0);
}

vec3 unproject(vec2 ndcXY, float ndcZ) {
  vec4 p = uInvVP * vec4(ndcXY, ndcZ, 1.0);
  return p.xyz / p.w;
}

void main() {
  vec2 uv  = gl_FragCoord.xy / uResolution;
  vec2 ndc = uv * 2.0 - 1.0;
  vec3 p0  = unproject(ndc, -1.0);
  vec3 p1  = unproject(ndc,  1.0);
  vec3 dir = normalize(p1 - p0);

  vec3 inv   = 1.0 / dir;
  vec3 tA    = (uBoxMin - uCamPos) * inv;
  vec3 tB    = (uBoxMax - uCamPos) * inv;
  vec3 tMin3 = min(tA, tB), tMax3 = max(tA, tB);
  float t0   = max(max(tMin3.x, tMin3.y), tMin3.z);
  float t1   = min(min(tMax3.x, tMax3.y), tMax3.z);
  t0 = max(t0, 0.0);
  if (t0 >= t1) discard;

  float d = texture2D(uDepth, uv).r;
  if (d < 1.0) {
    vec3 scenePos = unproject(ndc, d * 2.0 - 1.0);
    t1 = min(t1, distance(scenePos, uCamPos));
    if (t0 >= t1) discard;
  }

  const int STEPS = 192;
  float dt = (t1 - t0) / float(STEPS);
  vec3  C  = vec3(0.0);
  float T  = 1.0;
  for (int i = 0; i < STEPS; i++) {
    float t  = t0 + (float(i) + 0.5) * dt;
    vec3  p  = uCamPos + dir * t;
    vec3  tc = (p - uBoxMin) / (uBoxMax - uBoxMin);
    vec4  s  = sampleVol(tc);
    float sigma = s.a * uSigmaMax;
    if (sigma > 0.000001) {
      float a = 1.0 - exp(-sigma * dt);
      C += T * a * s.rgb * uRgbMax * uGain;
      T *= (1.0 - a);
      if (T < 0.01) break;
    }
  }
  if (T > 0.999) discard;
  C = pow(clamp(C, 0.0, 1.0), vec3(1.0 / 2.2));
  gl_FragColor = vec4(C, 1.0 - T);
}
`;

let _vol = null;
async function initVolume(volId) {
  try {
    const meta = await (await fetch(`volumes/${volId}.json?v=${CLOUD_VERSION}`)).json();
    const buf  = await (await fetch(`volumes/${volId}.bin?v=${CLOUD_VERSION}`)).arrayBuffer();
    const [NX, NY, NZ] = meta.shape;

    // Pack NZ slices into a 2D atlas — WebGL 1 has no sampler3D
    const NCOLS  = Math.ceil(Math.sqrt(NZ));
    const NROWS  = Math.ceil(NZ / NCOLS);
    const atlasW = NX * NCOLS;
    const atlasH = NY * NROWS;
    const src    = new Uint8Array(buf);
    const atlas  = new Uint8Array(atlasW * atlasH * 4);
    for (let z = 0; z < NZ; z++) {
      const col = z % NCOLS;
      const row = Math.floor(z / NCOLS);
      for (let y = 0; y < NY; y++) {
        const srcOff = (z * NY * NX + y * NX) * 4;
        const dstOff = ((row * NY + y) * atlasW + col * NX) * 4;
        atlas.set(src.subarray(srcOff, srcOff + NX * 4), dstOff);
      }
    }

    const tex = new THREE.DataTexture(atlas, atlasW, atlasH,
                                      THREE.RGBAFormat, THREE.UnsignedByteType);
    tex.minFilter    = THREE.LinearFilter;
    tex.magFilter    = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.unpackAlignment = 1;
    tex.needsUpdate  = true;

    const mat = new THREE.RawShaderMaterial({
      vertexShader:  VOL_VERT,
      fragmentShader: VOL_FRAG,
      uniforms: {
        uVol:        { value: tex },
        uDepth:      { value: null },
        uBoxMin:     { value: new THREE.Vector3(...meta.min) },
        uBoxMax:     { value: new THREE.Vector3(...meta.max) },
        uCamPos:     { value: new THREE.Vector3() },
        uInvVP:      { value: new THREE.Matrix4() },
        uResolution: { value: new THREE.Vector2() },
        uRgbMax:     { value: meta.rgb_max },
        uSigmaMax:   { value: meta.sigma_max },
        uGain:       { value: 1.0 },
        uNZ:         { value: NZ },
        uNCOLS:      { value: NCOLS },
        uNROWS:      { value: NROWS },
      },
      transparent: true,
      depthTest:  false,
      depthWrite: false,
      blending:   THREE.CustomBlending,
      blendSrc:   THREE.OneFactor,
      blendDst:   THREE.OneMinusSrcAlphaFactor,
    });

    // Fullscreen triangle — simpler and faster than a quad
    const geom = new THREE.BufferGeometry();
    const pos  = new THREE.BufferAttribute(
      new Float32Array([-1,-1,0, 3,-1,0, -1,3,0]), 3);
    if (geom.setAttribute) geom.setAttribute('position', pos);
    else                    geom.addAttribute('position', pos);
    const quad = new THREE.Mesh(geom, mat);
    quad.frustumCulled = false;
    const scene = new THREE.Scene();
    scene.add(quad);
    _vol = { mat, scene, cam: new THREE.Camera() };
    console.log(`[Volume] loaded ${volId} ${NX}x${NY}x${NZ} → atlas ${atlasW}x${atlasH} (${NCOLS}×${NROWS})`);

    // Draw after Potree's own render each frame
    const origRender = viewer.render.bind(viewer);
    viewer.render = function () {
      origRender();
      renderVolumePass();
    };
  } catch (err) {
    console.error("[Volume] failed to load:", volId, err);
  }
}

const _m4 = (typeof THREE !== "undefined") ? new THREE.Matrix4() : null;
// 1×1 white depth texture used when there is no point cloud (depth = 1.0 = far plane = no occlusion)
let _dummyDepth = null;
function _getDummyDepth() {
  if (_dummyDepth) return _dummyDepth;
  _dummyDepth = new THREE.DataTexture(new Uint8Array([255]), 1, 1, THREE.RedFormat, THREE.UnsignedByteType);
  _dummyDepth.needsUpdate = true;
  return _dummyDepth;
}
function renderVolumePass() {
  if (!_vol) return;
  const depthTex = (viewer.edlRenderer && viewer.edlRenderer.rtEDL)
    ? viewer.edlRenderer.rtEDL.depthTexture : null;
  const useDepth = depthTex || _getDummyDepth();  // fallback: no occlusion
  const cam = viewer.scene.getActiveCamera();
  const r = viewer.renderer;
  const size = r.getDrawingBufferSize(new THREE.Vector2());
  const u = _vol.mat.uniforms;
  u.uDepth.value = useDepth;
  u.uCamPos.value.copy(cam.position);
  _m4.multiplyMatrices(cam.projectionMatrix, cam.matrixWorldInverse);
  const inv = u.uInvVP.value.copy(_m4);
  if (typeof inv.invert === "function") inv.invert();
  else inv.getInverse(_m4);            // three < r123 API
  u.uResolution.value.copy(size);
  const oldAutoClear = r.autoClear;
  r.autoClear = false;
  r.render(_vol.scene, _vol.cam);
  r.autoClear = oldAutoClear;
}

{
  const volId = sceneVolume(SCENE_ID);
  if (volId) initVolume(volId);
}

// ── FPS counter ───────────────────────────────────────────────────────────────
let frames = 0, fpsT = performance.now();
const fpsEl = document.getElementById("fps-line");
(function loop() {
  requestAnimationFrame(loop);
  frames++;
  const now = performance.now();
  if (now - fpsT >= 1000) {
    fpsEl.textContent = frames + " fps";
    frames = 0;
    fpsT = now;
  }
})();

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
window.addEventListener("keydown", e => {
  if (e.key === "r" || e.key === "R") applyDefaultView();
  if (e.key === "e" || e.key === "E") document.getElementById("edl-btn").click();
  if (e.key === "c" || e.key === "C") document.getElementById("color-btn").click();
});
</script>
